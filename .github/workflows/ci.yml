name: GoatRaw CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "20"

jobs:
  # ── Backend Tests ────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER:     goatraw
          POSTGRES_PASSWORD: goatraw
          POSTGRES_DB:       goatraw_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Lint (syntax check)
        working-directory: backend
        run: |
          python -m py_compile $(find app -name "*.py" | head -30)
          echo "✓ No syntax errors"

      - name: Run unit tests
        working-directory: backend
        env:
          SECRET_KEY:     test-secret-key
          DATABASE_URL:   postgresql+asyncpg://goatraw:goatraw@localhost:5432/goatraw_test
          REDIS_URL:      redis://localhost:6379/15
          GROQ_API_KEY:   test_key
          OPENAI_API_KEY: test_key
          DEBUG:          "true"
        run: |
          pytest tests/unit/ -v --tb=short --cov=app --cov-report=xml

      - name: Run integration tests
        working-directory: backend
        env:
          SECRET_KEY:     test-secret-key
          DATABASE_URL:   postgresql+asyncpg://goatraw:goatraw@localhost:5432/goatraw_test
          REDIS_URL:      redis://localhost:6379/15
          GROQ_API_KEY:   test_key
          OPENAI_API_KEY: test_key
          DEBUG:          "true"
        run: |
          pytest tests/integration/ -v --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file:  backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ── Frontend Tests / Build ────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
        continue-on-error: true  # Don't block on type errors during dev

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://goatraw-api.onrender.com
        run: npm run build

  # ── Deploy to Render (main branch only) ──────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
          echo "✓ Render deploy triggered"

  # ── Deploy Frontend to Vercel (main branch only) ─────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:       ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:      ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id:  ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory:  frontend
          vercel-args:        "--prod"
